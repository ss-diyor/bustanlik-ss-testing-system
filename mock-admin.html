<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Imtihon — Savollar boshqaruvi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1a56e8;
    --blue-hover: #1441c0;
    --blue-light: #eef3ff;
    --blue-mid:   #c9d8ff;
    --text:       #0b1733;
    --muted:      #4a5978;
    --border:     #c9d8ff;
    --bg:         #f5f8ff;
    --surface:    #ffffff;
    --surface2:   #eef3ff;
    --shadow:     rgba(26,86,232,0.08);
    --red:        #e53e3e;
    --red-light:  #fff5f5;
    --green:      #16a34a;
    --green-light:#f0fdf4;
    --amber:      #d97706;
    --amber-light:#fffbeb;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'Inter', system-ui, sans-serif;
    --tr:         0.18s ease;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 60px;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(26,86,232,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,86,232,0.045) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  a { color: var(--blue); text-decoration: none; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .nav-title {
    display: flex; flex-direction: column; line-height: 1.2;
  }
  .nav-title span:first-child { font-size: 14px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.3px; }
  .nav-title span:last-child  { font-size: 11px; font-weight: 500; color: var(--muted); font-family: var(--mono); }
  .nav-badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 4px;
    background: var(--blue-light); color: var(--blue);
    border: 1px solid var(--blue-mid);
    margin-left: auto;
  }

  /* ── WRAP ── */
  .wrap {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 28px 20px;
    display: flex; flex-direction: column; gap: 24px;
  }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; flex-direction: column; gap: 4px; }
  .page-kicker {
    font-family: var(--mono); font-size: 11px; color: var(--blue);
  }
  .page-title {
    font-size: 22px; font-weight: 800; letter-spacing: -0.4px;
  }
  .page-sub {
    font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 2px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap;
  }
  .card-head-title {
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .card-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .card-inner {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .hidden { display: none !important; }

  /* ── FORM ELEMENTS ── */
  label {
    display: block;
    font-family: var(--mono); font-size: 11px;
    font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    font-family: var(--mono); font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
    font-family: var(--sans);
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,86,232,0.1);
  }
  textarea { resize: vertical; min-height: 70px; }
  input[type=number] { max-width: 120px; }
  input[type=checkbox], input[type=radio] { width: auto; flex: none; accent-color: var(--blue); }

  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 140px; }

  /* ── BUTTONS ── */
  button {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    padding: 10px 16px; border-radius: 7px;
    cursor: pointer; border: none;
    transition: all var(--tr);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary {
    background: var(--blue); color: #fff;
  }
  .btn-primary:hover { background: var(--blue-hover); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

  .btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red);
  }
  .btn-danger:hover { background: var(--red-light); }

  .btn-sm { padding: 6px 12px; font-size: 11px; }

  /* ── TEST ITEMS ── */
  .test-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background var(--tr);
  }
  .test-item:last-child { border-bottom: none; }
  .test-item:hover { background: var(--surface2); }
  .test-item.active {
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
  }
  .item-title {
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 3px;
  }
  .item-id {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  /* ── BADGES ── */
  .badge {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: var(--blue-light); color: var(--blue);
    display: inline-block; white-space: nowrap;
  }
  .badge.muted  { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .badge.amber  { background: var(--amber-light); color: var(--amber); border: 1px solid #fde68a; }
  .badge.green  { background: var(--green-light); color: var(--green); border: 1px solid #bbf7d0; }
  .badge.danger { background: var(--red-light); color: var(--red); border: 1px solid #fecaca; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 20px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all var(--tr);
  }
  .tab:hover { color: var(--blue); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── QUESTION ITEMS ── */
  .q-item {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px;
    background: var(--surface);
    transition: border-color var(--tr);
  }
  .q-item:hover { border-color: var(--blue-mid); }
  .q-type  {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    color: var(--blue); text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 4px;
  }
  .q-text  { font-size: 13px; margin-bottom: 8px; line-height: 1.5; }

  /* ── OPT ROWS ── */
  .opt-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
  }
  .opt-row input[type=text] { flex: 1; }
  .blank-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 6px;
  }
  .blank-row .blank-lbl {
    font-family: var(--mono); font-size: 11px; color: var(--blue);
    font-weight: 600; min-width: 32px;
  }
  .match-row {
    display: flex; gap: 10px; align-items: center; margin-bottom: 6px;
  }
  .match-row span { flex: 1; font-size: 13px; }
  .match-row select { flex: 1; }

  /* ── MSG ── */
  .msg { font-family: var(--mono); font-size: 12px; min-height: 18px; }
  .msg.ok  { color: var(--green); }
  .msg.err { color: var(--red); }

  /* ── EMPTY / SPINNER ── */
  .empty {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    padding: 20px; text-align: center;
  }
  .spinner {
    width: 22px; height: 22px; margin: 20px auto;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    nav { padding: 10px 14px; }
    .wrap { padding: 20px 14px; }
    .card-body { padding: 14px; }
    .tabs .tab { padding: 9px 12px; font-size: 11px; }
    .row > * { min-width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>

          <input id="testDurationInput" type="number" value="60">
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <button class="btn-primary" id="createTestBtn">+ Test yaratish</button>
        <div id="createTestMsg" class="msg"></div>
      </div>
    </div>
  </div>

  <!-- Testlar ro'yxati -->
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">Mavjud testlar</div>
    </div>
    <div id="testsList">
      <div class="empty">Yuklanmoqda...</div>
    </div>
  </div>

  <!-- Tanlangan test tafsiloti -->
  <div class="card hidden" id="testDetailCard">
    <div class="card-head">
      <div class="card-head-title" id="testDetailTitle">—</div>
      <div class="toolbar">
        <button class="btn-secondary btn-sm" id="toggleActiveBtn">Faollikni o'zgartirish</button>
        <button class="btn-danger btn-sm" id="deleteTestBtn">O'chirish</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab" data-key="listening">🎧 Listening</div>
      <div class="tab" data-key="reading">📖 Reading</div>
      <div class="tab" data-key="writing">✍️ Writing</div>
    </div>

    <div id="sectionArea" style="padding:16px 20px;"></div>
  </div>

</div><!-- /wrap -->

<script>
const IS_DEBUG_USER_ID = new URLSearchParams(location.search).get("user_id");

function authHeaders(){
  const h = {"Content-Type":"application/json"};
  try{
    const initData = window.Telegram?.WebApp?.initData || "";
    if (initData) h["X-Telegram-Init-Data"] = initData;
  }catch(e){}
  return h;
}
function withDebug(url){
  if (IS_DEBUG_USER_ID && !(window.Telegram?.WebApp?.initData)){
    return url + (url.includes("?") ? "&" : "?") + "user_id=" + IS_DEBUG_USER_ID;
  }
  return url;
}
async function api(path, opts={}){
  const res = await fetch(withDebug(path), { headers: authHeaders(), ...opts });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

let currentTest = null;
let currentSectionKey = "listening";
let sectionsCache = {};
const SECTION_LABELS = {listening:"Listening", reading:"Reading", writing:"Writing"};

// ─── Imtihon turlari ───
async function loadExamTypes(){
  try{
    const data = await api("/api/admin/mock/exam-types");
    const sel = document.getElementById("examTypeSelect");
    sel.innerHTML = (data.exam_types || []).map(t =>
      `<option value="${t.exam_key}">${t.label || t.exam_key}</option>`
    ).join("") || `<option value="IELTS">IELTS</option><option value="CEFR">CEFR</option>`;
  }catch(e){
    document.getElementById("examTypeSelect").innerHTML =
      `<option value="IELTS">IELTS</option><option value="CEFR">CEFR</option>`;
  }
}

// ─── Test yaratish ───
document.getElementById("createTestBtn").onclick = async () => {
  const exam_key = document.getElementById("examTypeSelect").value;
  const title = document.getElementById("testTitleInput").value.trim();
  const duration_minutes = parseInt(document.getElementById("testDurationInput").value || "60");
  const msg = document.getElementById("createTestMsg");
  if (!title){ msg.textContent = "Test nomini kiriting"; msg.className = "msg err"; return; }
  try{
    await api("/api/admin/mock/tests", {method:"POST", body: JSON.stringify({exam_key, title, duration_minutes})});
    msg.textContent = "✅ Test yaratildi"; msg.className = "msg ok";
    document.getElementById("testTitleInput").value = "";
    loadTests();
  }catch(e){
    msg.textContent = "Xato: " + e.message; msg.className = "msg err";
  }
};

// ─── Testlar ro'yxati ───
async function loadTests(){
  const box = document.getElementById("testsList");
  try{
    const data = await api("/api/admin/mock/tests");
    if (!data.tests || !data.tests.length){
      box.innerHTML = `<div class="empty">Hali test yaratilmagan</div>`;
      return;
    }
    box.innerHTML = data.tests.map(t => `
      <div class="test-item" data-id="${t.id}">
        <div>
          <div class="item-title">
            ${t.title}
            <span class="badge">${t.exam_key}</span>
            <span class="badge muted">${t.duration_minutes} daq</span>
            ${!t.is_active ? '<span class="badge danger">nofaol</span>' : '<span class="badge green">faol</span>'}
          </div>
          <div class="item-id">#${t.id}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    `).join("");
    box.querySelectorAll(".test-item").forEach(el => {
      el.onclick = () => selectTest(parseInt(el.dataset.id));
    });
  }catch(e){
    box.innerHTML = `<div class="empty">Xato: ${e.message}</div>`;
  }
}

// ─── Test tanlash ───
async function selectTest(id){
  try{
    const data = await api("/api/admin/mock/tests/" + id);
    currentTest = data.test;
    sectionsCache = {};
    (currentTest.sections || []).forEach(s => { sectionsCache[s.section_key] = s; });

    document.querySelectorAll(".test-item").forEach(el => {
      el.classList.toggle("active", parseInt(el.dataset.id) === id);
    });

    document.getElementById("testDetailCard").classList.remove("hidden");
    document.getElementById("testDetailTitle").textContent =
      `${currentTest.title} (${currentTest.exam_key})`;

    currentSectionKey = "listening";
    renderTabs();
    await renderSection(currentSectionKey);

    document.getElementById("testDetailCard").scrollIntoView({behavior:"smooth", block:"start"});
  }catch(e){
    alert("Xato: " + e.message);
  }
}

document.getElementById("toggleActiveBtn").onclick = async () => {
  if (!currentTest) return;
  await api("/api/admin/mock/tests/" + currentTest.id, {
    method:"PUT", body: JSON.stringify({is_active: !currentTest.is_active})
  });
  loadTests();
  selectTest(currentTest.id);
};
document.getElementById("deleteTestBtn").onclick = async () => {
  if (!currentTest) return;
  if (!confirm("Bu testni butunlay o'chirmoqchimisiz? Barcha savollar va urinishlar ham o'chadi.")) return;
  await api("/api/admin/mock/tests/" + currentTest.id, {method:"DELETE"});
  document.getElementById("testDetailCard").classList.add("hidden");
  currentTest = null;
  loadTests();
};

function renderTabs(){
  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.key === currentSectionKey);
    tab.onclick = () => { currentSectionKey = tab.dataset.key; renderTabs(); renderSection(currentSectionKey); };
  });
}

// ─── Bo'lim render ───
async function renderSection(sectionKey){
  const area = document.getElementById("sectionArea");
  let section = sectionsCache[sectionKey];

  if (section && !section.questions){
    const data = await api("/api/admin/mock/sections/" + section.id);
    section = data.section;
    sectionsCache[sectionKey] = section;
  }

  if (!section){
    area.innerHTML = renderCreateSectionForm(sectionKey);
    bindCreateSectionForm(sectionKey);
    return;
  }

  area.innerHTML = `
    ${section.instructions || section.audio_url ? `
      <div class="card-inner" style="padding:12px 14px; margin-bottom:14px; font-family:var(--mono); font-size:12px; color:var(--muted); line-height:1.6;">
        ${section.instructions || ''}
        ${section.audio_url ? `<br>🔊 <a href="${section.audio_url}" target="_blank">Audio: ${section.audio_url}</a>` : ''}
      </div>
    ` : ''}
    <div id="questionsList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;"></div>
    <button class="btn-secondary" id="addQuestionBtn">+ Savol qo'shish</button>
    <div id="questionFormArea" style="margin-top:14px;"></div>
  `;

  const qList = document.getElementById("questionsList");
  if (!section.questions || !section.questions.length){
    qList.innerHTML = `<div class="empty" style="text-align:left;padding:8px 0;">Hali savol qo'shilmagan</div>`;
  } else {
    qList.innerHTML = section.questions.map((q, i) => `
      <div class="q-item">
        <div class="q-type">${q.question_type} · ${q.points} ball</div>
        <div class="q-text">${i+1}. ${q.question_text}</div>
        <button class="btn-danger btn-sm" onclick="deleteQuestion(${q.id})">O'chirish</button>
      </div>
    `).join("");
  }

  document.getElementById("addQuestionBtn").onclick = () => {
    document.getElementById("questionFormArea").innerHTML = renderQuestionForm();
    bindQuestionForm(section.id);
  };
}

function renderCreateSectionForm(sectionKey){
  const label = SECTION_LABELS[sectionKey];
  const isListening = sectionKey === "listening";
  return `
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="empty" style="text-align:left;padding:0;">Bu test uchun "${label}" bo'limi hali yaratilmagan</div>
      ${isListening ? `
        <div>
          <label>Audio fayl URL (Cloudinary va h.k.)</label>
          <input id="newSectionAudio" placeholder="https://...">
        </div>
      ` : ''}
      <div>
        <label>Ko'rsatma / instructions (talabaga ko'rinadi)</label>
        <textarea id="newSectionInstructions" placeholder="Masalan: Listen to the recording and answer questions 1-10"></textarea>
      </div>
      <div>
        <button class="btn-primary" id="createSectionBtn">"${label}" bo'limini yaratish</button>
      </div>
    </div>
  `;
}

function bindCreateSectionForm(sectionKey){
  document.getElementById("createSectionBtn").onclick = async () => {
    const audio_url = document.getElementById("newSectionAudio")?.value.trim() || null;
    const instructions = document.getElementById("newSectionInstructions").value.trim() || null;
    const data = await api("/api/admin/mock/sections", {
      method:"POST",
      body: JSON.stringify({
        test_id: currentTest.id, section_key: sectionKey,
        label: SECTION_LABELS[sectionKey], audio_url, instructions,
      }),
    });
    sectionsCache[sectionKey] = {id: data.id, section_key: sectionKey, audio_url, instructions, questions: []};
    renderSection(sectionKey);
  };
}

async function deleteQuestion(qid){
  if (!confirm("Savolni o'chirmoqchimisiz?")) return;
  await api("/api/admin/mock/questions/" + qid, {method:"DELETE"});
  delete sectionsCache[currentSectionKey].questions;
  renderSection(currentSectionKey);
}

// ─── Savol qo'shish formasi ───
function renderQuestionForm(){
  return `
    <div class="card-inner" style="padding:16px; display:flex; flex-direction:column; gap:12px; border-color:var(--blue-mid);">
      <div>
        <label>Savol turi</label>
        <select id="qType">
          <option value="mcq">Multiple Choice (bitta yoki bir nechta to'g'ri)</option>
          <option value="true_false">True / False / Not Given</option>
          <option value="fill_blank">Bo'sh joy to'ldirish</option>
          <option value="matching">Moslashtirish (matching)</option>
        </select>
      </div>
      <div>
        <label>Savol matni / topshiriq</label>
        <textarea id="qText" placeholder="Savol yoki topshiriq matnini yozing"></textarea>
      </div>
      <div id="qTypeFields"></div>
      <div>
        <label>Ball</label>
        <input id="qPoints" type="number" step="0.5" value="1" style="max-width:100px">
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button class="btn-primary" id="saveQuestionBtn">Savolni saqlash</button>
        <div id="qSaveMsg" class="msg"></div>
      </div>
    </div>
  `;
}

function bindQuestionForm(sectionId){
  const typeSelect = document.getElementById("qType");
  const fieldsBox = document.getElementById("qTypeFields");

  function renderFieldsFor(type){
    if (type === "mcq"){
      fieldsBox.innerHTML = `
        <label>Variantlar (har biri yonidagi katakcha — to'g'ri javob)</label>
        <div id="optRows" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;"></div>
        <button type="button" class="btn-secondary btn-sm" id="addOptBtn">+ Variant qo'shish</button>
      `;
      const rows = document.getElementById("optRows");
      const addRow = (val="") => {
        const row = document.createElement("div");
        row.className = "opt-row";
        row.innerHTML = `<input type="checkbox" class="optCorrect"><input type="text" class="optText" value="${val}" placeholder="Variant matni"><button type="button" class="btn-danger btn-sm" onclick="this.parentElement.remove()">×</button>`;
        rows.appendChild(row);
      };
      addRow(); addRow(); addRow(); addRow();
      document.getElementById("addOptBtn").onclick = () => addRow();
    }

    if (type === "true_false"){
      fieldsBox.innerHTML = `
        <label>To'g'ri javobni belgilang</label>
        <div class="opt-row"><input type="radio" name="tfCorrect" value="0" checked><span style="font-size:13px;margin-left:4px">True</span></div>
        <div class="opt-row"><input type="radio" name="tfCorrect" value="1"><span style="font-size:13px;margin-left:4px">False</span></div>
        <div class="opt-row"><input type="radio" name="tfCorrect" value="2"><span style="font-size:13px;margin-left:4px">Not Given</span></div>
      `;
    }

    if (type === "fill_blank"){
      fieldsBox.innerHTML = `
        <label>Bo'sh joylar soni</label>
        <input id="blankCount" type="number" min="1" value="1" style="max-width:100px">
        <div id="blankRows" style="margin-top:10px;display:flex;flex-direction:column;gap:6px;"></div>
      `;
      const renderBlankRows = () => {
        const n = parseInt(document.getElementById("blankCount").value || "1");
        const box = document.getElementById("blankRows");
        box.innerHTML = "";
        for (let i=0;i<n;i++){
          const row = document.createElement("div");
          row.className = "blank-row";
          row.innerHTML = `<span class="blank-lbl">#${i+1}</span><input type="text" class="blankAns" placeholder="To'g'ri javob(lar), vergul bilan: cat, cats">`;
          box.appendChild(row);
        }
      };
      document.getElementById("blankCount").oninput = renderBlankRows;
      renderBlankRows();
    }

    if (type === "matching"){
      fieldsBox.innerHTML = `
        <div class="row">
          <div>
            <label>Elementlar (har qatorga bitta)</label>
            <textarea id="matchItems" placeholder="1&#10;2&#10;3"></textarea>
          </div>
          <div>
            <label>Variantlar (har qatorga bitta)</label>
            <textarea id="matchOptions" placeholder="A&#10;B&#10;C&#10;D"></textarea>
          </div>
        </div>
        <button type="button" class="btn-secondary btn-sm" id="buildMatchBtn">Mosliklarni belgilash</button>
        <div id="matchRows" style="margin-top:10px;display:flex;flex-direction:column;gap:6px;"></div>
      `;
      document.getElementById("buildMatchBtn").onclick = () => {
        const items = document.getElementById("matchItems").value.split("\n").map(s=>s.trim()).filter(Boolean);
        const options = document.getElementById("matchOptions").value.split("\n").map(s=>s.trim()).filter(Boolean);
        const box = document.getElementById("matchRows");
        box.innerHTML = items.map(item => `
          <div class="match-row" data-item="${item}">
            <span>${item}</span>
            <select class="matchSelect">${options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select>
          </div>
        `).join("");
      };
    }
  }

  typeSelect.onchange = () => renderFieldsFor(typeSelect.value);
  renderFieldsFor(typeSelect.value);

  document.getElementById("saveQuestionBtn").onclick = async () => {
    const type = typeSelect.value;
    const question_text = document.getElementById("qText").value.trim();
    const points = parseFloat(document.getElementById("qPoints").value || "1");
    const msg = document.getElementById("qSaveMsg");

    if (!question_text){ msg.textContent = "Savol matnini kiriting"; msg.className="msg err"; return; }

    let content = {}, correct_answer = {};

    if (type === "mcq"){
      const opts = [...document.querySelectorAll("#optRows .opt-row")];
      const options = opts.map(r => r.querySelector(".optText").value.trim());
      const correct = opts.map((r,i) => r.querySelector(".optCorrect").checked ? i : null).filter(i=>i!==null);
      if (!options.length || !correct.length){ msg.textContent="Variantlar va to'g'ri javobni belgilang"; msg.className="msg err"; return; }
      content = {options}; correct_answer = {correct};
    }

    if (type === "true_false"){
      content = {options:["True","False","Not Given"]};
      const checked = document.querySelector('input[name="tfCorrect"]:checked');
      correct_answer = {correct:[parseInt(checked.value)]};
    }

    if (type === "fill_blank"){
      const rows = [...document.querySelectorAll(".blankAns")];
      const answers = rows.map(r => r.value.split(",").map(s=>s.trim()).filter(Boolean));
      if (!answers.length || answers.some(a=>!a.length)){ msg.textContent="Har bir bo'sh joy uchun javob kiriting"; msg.className="msg err"; return; }
      content = {blanks_count: answers.length}; correct_answer = {answers};
    }

    if (type === "matching"){
      const items = document.getElementById("matchItems").value.split("\n").map(s=>s.trim()).filter(Boolean);
      const options = document.getElementById("matchOptions").value.split("\n").map(s=>s.trim()).filter(Boolean);
      const rows = [...document.querySelectorAll(".match-row")];
      if (!rows.length){ msg.textContent = "Avval 'Mosliklarni belgilash' tugmasini bosing"; msg.className="msg err"; return; }
      const map = {};
      rows.forEach(r => { map[r.dataset.item] = r.querySelector(".matchSelect").value; });
      content = {items, options}; correct_answer = {map};
    }

    try{
      await api("/api/admin/mock/questions", {
        method:"POST",
        body: JSON.stringify({section_id: sectionId, question_type: type, question_text, content, correct_answer, points}),
      });
      msg.textContent = "✅ Savol qo'shildi"; msg.className = "msg ok";
      delete sectionsCache[currentSectionKey].questions;
      setTimeout(() => renderSection(currentSectionKey), 400);
    }catch(e){
      msg.textContent = "Xato: " + e.message; msg.className = "msg err";
    }
  };
}

// ─── Init ───
loadExamTypes();
loadTests();
</script>
</body>
</html>
