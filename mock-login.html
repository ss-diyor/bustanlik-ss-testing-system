<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Imtihon — Kirish</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:       #1a56e8;
    --blue-hover: #1441c0;
    --blue-light: #eef3ff;
    --blue-mid:   #c9d8ff;
    --text:       #0b1733;
    --muted:      #4a5978;
    --border:     #c9d8ff;
    --bg:         #f5f8ff;
    --surface:    #ffffff;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'Inter', system-ui, sans-serif;
    --tr:         0.2s ease;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(26,86,232,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,86,232,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  a { color: inherit; text-decoration: none; }

  /* ── NAV ── */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--mono);
    font-size: 14px; font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-back {
    font-family: var(--mono); font-size: 12px;
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
    transition: color var(--tr);
  }
  .nav-back:hover { color: var(--blue); }

  /* ── MAIN ── */
  main {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 48px 20px;
  }

  .login-wrap {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 24px;
  }

  /* Header text */
  .login-header { text-align: center; }
  .login-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; color: var(--text);
    border: 1px solid var(--border); background: var(--surface);
    padding: 7px 14px; border-radius: 6px;
    margin-bottom: 20px;
  }
  .status-dot {
    width: 8px; height: 8px;
    background: var(--blue); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .login-title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.5px; margin-bottom: 8px;
  }
  .login-sub {
    font-family: var(--mono); font-size: 12px;
    color: var(--muted); line-height: 1.6;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    display: flex; flex-direction: column; gap: 0;
  }

  .field-label {
    font-family: var(--mono); font-size: 11px;
    font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 8px; display: block;
  }

  input#kodInput {
    width: 100%;
    font-family: var(--mono); font-size: 18px;
    font-weight: 600; letter-spacing: 2px;
    color: var(--text);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
  }
  input#kodInput::placeholder {
    font-size: 14px; letter-spacing: 0; font-weight: 400;
    color: var(--border);
  }
  input#kodInput:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(26,86,232,0.12);
  }

  #loginBtn {
    margin-top: 16px;
    width: 100%;
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    padding: 14px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px;
    cursor: pointer;
    transition: background var(--tr), transform var(--tr);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #loginBtn:hover:not(:disabled) {
    background: var(--blue-hover); transform: translateY(-1px);
  }
  #loginBtn:disabled {
    opacity: 0.6; cursor: not-allowed; transform: none;
  }

  .msg {
    margin-top: 12px;
    font-family: var(--mono); font-size: 12px;
    min-height: 20px; border-radius: 6px;
    padding: 0; transition: all var(--tr);
  }
  .msg.err {
    color: #c0392b;
    background: #fef2f2;
    border: 1px solid #fecaca;
    padding: 10px 14px;
  }

  /* Footer hint */
  .login-hint {
    text-align: center;
    font-family: var(--mono); font-size: 11px;
    color: var(--muted); line-height: 1.7;
  }
  .login-hint a {
    color: var(--blue);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* Footer */
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 20px 48px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }
  footer a { color: var(--blue); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  @media (max-width: 600px) {
    nav { padding: 14px 20px; }
    footer { padding: 16px 20px; flex-direction: column; align-items: flex-start; }
    .card { padding: 24px 20px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>

  <div class="login-wrap">

    <div class="login-header">
      <h1 class="login-title">Mock Imtihon</h1>
      <p class="login-sub">IELTS / CEFR — Bo'stonliq tuman ixtisoslashtirilgan maktabi</p>

      <label class="field-label" for="kodInput">Shaxsiy kodingizni kiriting</label>
      <input id="kodInput" placeholder="Masalan: SS001" autocomplete="off" autocapitalize="characters">
      <button id="loginBtn">Kirish →</button>

<script>
const input = document.getElementById("kodInput");
const btn   = document.getElementById("loginBtn");
const msg   = document.getElementById("loginMsg");

async function doLogin() {
  const kod = input.value.trim();
  if (!kod) { msg.textContent = "Kodni kiriting"; msg.className = "msg err"; return; }
  btn.disabled = true; btn.textContent = "Tekshirilmoqda...";
  try {
    const res = await fetch("/api/mock/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({kod}),
    });
    const data = await res.json();
    if (!res.ok) {
      msg.textContent = data.error || "Xato yuz berdi";
      msg.className = "msg err";
      btn.disabled = false; btn.textContent = "Kirish →";
      return;
    }
    location.href = "/mock/home";
  } catch(e) {
    msg.textContent = "Server bilan bog\'lanishda xato";
    msg.className = "msg err";
    btn.disabled = false; btn.textContent = "Kirish →";
  }
}

btn.onclick = doLogin;
input.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
input.addEventListener("input", () => { input.value = input.value.toUpperCase(); });
</script>
